# ============================================================================
# grub.cfg — sample dual-boot configuration generated by ps5-linux-manager
#
# The manager keeps its live copy at /data/ps5-linux-manager/grub.cfg,
# regenerated whenever the boot entries are edited from the web UI
# (Dual Boot page) and POSTed to /api/boot/grub.
#
# This sample mirrors the factory-default entry model:
#   1. "PS5 Linux (USB)"  — boots bzImage + initrd.img from the PS5/Linux
#      directory of the first USB stick (the same files ps5-linux-loader
#      2.4 consumes, along with cmdline.txt / vram.txt).
#   2. "Orbis OS (PS5 System)" — exits GRUB and resumes the stock Orbis
#      boot chain.
#
# Fields the manager manages for you: default, timeout, per-entry title /
# kernel / initrd / cmdline / enabled.  Raw edits are also honored: post
# this file verbatim as "grubCfg" and the manager stores it as an
# override instead of regenerating from the entry model.
# ============================================================================

set default="linux-ps5"
set timeout=5

# --- PS5 Linux -------------------------------------------------------------
# linux/initrd paths are relative to the PS5/Linux directory on USB.
# The cmdline below matches templates/cmdline.txt; the BIOS page of the
# manager composes it as: kernelParams + " root=<rootDevice>" (+ mode flag).
menuentry "PS5 Linux (USB)" --id linux-ps5 {
    linux /bzImage rw rootwait mitigations=off
    initrd /initrd.img
}

# --- Orbis OS --------------------------------------------------------------
# Leaving GRUB hands control back to the Orbis boot chain — i.e. a normal
# PS5 system boot without touching Linux.
menuentry "Orbis OS (PS5 System)" --id orbis {
    exit
}
